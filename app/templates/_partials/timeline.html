{# Vertical status-event timeline. Most recent first. Pass `timeline` (list of dicts). #}
<ol class="order-timeline">
  {% for e in timeline|reverse %}
    <li class="event event-{{ e.to }}">
      <time datetime="{{ e.occurred_at }}">{{ e.occurred_at }}</time>
      <strong>
        {{ (e['from'] or '—')|replace('_', ' ') }} &rarr; {{ e.to|replace('_', ' ') }}
      </strong>
      {% if e.note %}<p class="event-note">{{ e.note }}</p>{% endif %}
    </li>
  {% endfor %}
</ol>
