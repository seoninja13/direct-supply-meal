<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}{{ page_title|default("ds-meal") }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <nav class="topnav">
    <a href="/" class="brand">ds-meal</a>
    <a href="/recipes">Recipes</a>
    <span class="spacer"></span>
    {% if user %}
      <span class="user">{{ user.email }}</span>
      <form method="post" action="/sign-out" class="inline">
        <button type="submit" class="linkbtn">Sign out</button>
      </form>
    {% else %}
      <a href="/sign-in" class="signin">Sign in</a>
    {% endif %}
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <small>
      ds-meal prototype (Phase 1) &middot;
      <a href="https://github.com/seoninja13/direct-supply-meal">source on GitHub</a>
    </small>
  </footer>
</body>
</html>
